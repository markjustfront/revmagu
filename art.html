<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Art | Mar Aguilar Serrats</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVIGATION -->
    <div id="navbar"></div>

    <!-- HERO -->
    <section class="page-hero">

        <span class="hero-label">
            Visual Development & Art
        </span>
        <h1>
            Art Portfolio
        </h1>
        <p>
            Character design, concept art,
            visual development and illustrations.
        </p>

    </section>

    <!-- GALLERY -->

    <section class="gallery-container">

        <div class="gallery">

            <img src="images/Art/art9.png" alt="Artwork">
            <img src="images/Art/art4.png" alt="Artwork">
            <img src="images/Art/art1.png" alt="Artwork">
            <img src="images/Art/art7.png" alt="Artwork">
            <img src="images/Art/art10.png" alt="Artwork">
            <img src="images/Art/art2.png" alt="Artwork">
            <img src="images/Art/art5.png" alt="Artwork">
            <img src="images/Art/art8.png" alt="Artwork">
            <img src="images/Art/art3.png" alt="Artwork">
            <img src="images/Art/art6.png" alt="Artwork">

        </div>

    </section>

    <!-- LIGHTBOX -->

    <div id="lightbox">

        <img id="lightbox-img" src="" alt="Artwork">

    </div>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script>

        const images = document.querySelectorAll('.gallery img');

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        images.forEach(img => {

            img.addEventListener('click', () => {

                lightbox.style.display = 'flex';

                lightboxImg.src = img.src;

            });

        });

        lightbox.addEventListener('click', () => {

            lightbox.style.display = 'none';

        });

        document.addEventListener('keydown', e => {

            if (e.key === 'Escape') {

                lightbox.style.display = 'none';

            }

        });

    </script>
    <script src="js/components.js"></script>

</body>

</html>
