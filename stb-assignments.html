<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>STB Assignments | Mar Aguilar Serrats</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- NAVIGATION -->

    <div id="navbar"></div>

    <!-- HERO -->

    <section class="page-hero">

        <span class="hero-label">
            STORYBOARD
        </span>

        <h1>
            STB Assignments
        </h1>

        <p>
            Storyboard exercises, visual storytelling studies,
            animatics, cinematic composition and personal challenges.
        </p>

    </section>

    <!-- DEMO REEL -->

    <section class="max-w-5xl mx-auto px-6 pb-24">

        <h2 class="section-title">
            Demo Reel
        </h2>

        <div class="featured-video">

            <video controls>

                <source src="videos/stb-demo-reel.mp4"
                        type="video/mp4">

            </video>

        </div>

    </section>

    <!-- ASSIGNMENTS -->

    <section class="max-w-7xl mx-auto px-6 pb-24">

        <h2 class="section-title">
            Assignments
        </h2>

        <div class="gallery">

            <img src="images/Storyboard/assignment1.jpg"
                 alt="Storyboard Assignment">

            <img src="images/Storyboard/assignment2.jpg"
                 alt="Storyboard Assignment">

            <img src="images/Storyboard/assignment3.jpg"
                 alt="Storyboard Assignment">

            <img src="images/Storyboard/assignment4.jpg"
                 alt="Storyboard Assignment">

            <img src="images/Storyboard/assignment5.jpg"
                 alt="Storyboard Assignment">

            <img src="images/Storyboard/assignment6.jpg"
                 alt="Storyboard Assignment">

        </div>

    </section>

    <!-- PROJECT TEASERS -->

    <section class="max-w-7xl mx-auto px-6 pb-24">

        <h2 class="section-title">
            Related Projects
        </h2>

        <div class="grid md:grid-cols-2 gap-10">

            <a href="entre-mesas-storyboard.html"
               class="project-link">

                <article class="project-card">

                    <img src="images/Storyboard/entre_mesas_ref_edited.jpeg"
                         alt="Entre Mesas"
                         class="project-image">

                    <div class="p-6">

                        <h3>
                            Entre Mesas
                        </h3>

                    </div>

                </article>

            </a>

            <article class="project-card">

                <img src="images/Storyboard/placeholder.jpg"
                     alt="Coming Soon"
                     class="project-image">

                <div class="p-6">

                    <h3>
                        More Projects Coming Soon
                    </h3>

                </div>

            </article>

        </div>

    </section>

    <!-- FOOTER -->

    <div id="footer"></div>

    <script src="js/components.js"></script>

</body>

</html>
